apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
  namespace: openclaw-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: openclaw-operator
      version: ">=0.12.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: openclaw-operator
        namespace: flux-system
      interval: 24h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
