apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: immich
spec:
  accessModes:
    - ReadWriteOnce
  # do-block-storage-retain: like do-block-storage but volume is NOT deleted
  # when the PVC is deleted. Safer for photo storage you care about.
  storageClassName: do-block-storage-retain
  resources:
    requests:
      storage: 50Gi
