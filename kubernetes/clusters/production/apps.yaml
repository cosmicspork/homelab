apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  # Apps won't be reconciled until infrastructure is healthy.
  # This ensures ingress-nginx exists before we try to create Ingress resources.
  dependsOn:
    - name: infrastructure
    - name: configs
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  interval: 1h
  path: ./kubernetes/apps/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
