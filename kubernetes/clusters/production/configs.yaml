apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: configs
  namespace: flux-system
spec:
  # infrastructure must be Ready (cert-manager CRDs installed) before the
  # ClusterIssuer resource can be applied.
  dependsOn:
    - name: infrastructure
  interval: 1h
  path: ./kubernetes/infrastructure/configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 2m
