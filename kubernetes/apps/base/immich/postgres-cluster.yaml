apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: immich
spec:
  instances: 1

  # Immich requires pgvecto.rs for vector similarity search.
  # This TensorChord image is CloudNativePG-compatible with pgvecto.rs pre-installed.
  imageName: ghcr.io/tensorchord/cloudnative-pgvecto.rs:pg16-latest

  postgresql:
    shared_preload_libraries:
      - vectors.so

  bootstrap:
    initdb:
      database: immich
      owner: immich
      # CloudNativePG reads 'username' and 'password' keys from this secret
      # to create the initial DB user. We apply this secret imperatively.
      secret:
        name: immich-postgres

  storage:
    size: 8Gi
    storageClass: do-block-storage
