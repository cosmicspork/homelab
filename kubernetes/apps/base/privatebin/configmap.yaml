apiVersion: v1
kind: ConfigMap
metadata:
  name: privatebin-conf
  namespace: privatebin
data:
  conf.php: |
    [main]
    name = "PrivateBin"
    discussion = true
    opendiscussion = false
    password = true
    fileupload = false
    burnafterreadingselected = false
    defaultformatter = "plaintext"
    sizelimit = 10485760
    template = "bootstrap5"
    languageselection = false

    [expire]
    default = "1week"

    [expire_options]
    5min = 300
    10min = 600
    1hour = 3600
    1day = 86400
    1week = 604800
    1month = 2592000
    1year = 31536000
    never = 0

    [formatter_options]
    plaintext = "Plain Text"
    syntaxhighlighting = "Source Code"
    markdown = "Markdown"

    [traffic]
    limit = 10

    [model]
    class = Filesystem

    [model_options]
    dir = PATH "data"
