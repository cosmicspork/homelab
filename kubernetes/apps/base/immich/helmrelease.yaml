apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: ">=0.10.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: immich-postgres
      valuesKey: password
      targetPath: controllers.main.containers.main.env.DB_PASSWORD
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: release
            env:
              # Service created by postgres-service.yaml
              DB_HOSTNAME: "immich-postgres.immich.svc.cluster.local"
              DB_DATABASE_NAME: immich
              DB_USERNAME: immich
              # DB_PASSWORD injected via valuesFrom above

    immich:
      persistence:
        library:
          existingClaim: immich-library

    valkey:
      enabled: true

    server:
      ingress:
        main:
          enabled: true
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
          hosts:
            - host: immich.0x69.xyz
              paths:
                - path: "/"
                  service:
                    identifier: main
          tls: []

    machine-learning:
      enabled: false
