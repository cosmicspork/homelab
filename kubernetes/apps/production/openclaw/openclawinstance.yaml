apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw
spec:
  storage:
    persistence:
      enabled: true
      storageClass: do-block-storage-retain
      size: 5Gi

  envFrom:
    - secretRef:
        name: openclaw-secret

  config:
    raw:
      gateway:
        auth:
          mode: password
        controlUi:
          allowedOrigins:
            - "https://ai.0x69.xyz"
      agents:
        defaults:
          model:
            primary: "openrouter/anthropic/claude-sonnet-4-6"
      channels:
        whatsapp:
          dmPolicy: "allowlist"
          allowFrom:
            - "+14028132356"
            - "+14025419408"
            - "+917738149662"
          groupPolicy: "allowlist"

  autoUpdate:
    enabled: true
    checkInterval: 24h
    backupBeforeUpdate: true
    rollbackOnFailure: true

  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - config
      - envVars
      - workspaceFiles

  chromium:
    enabled: true
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

  webTerminal:
    enabled: true
    readOnly: false

  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - ingress-nginx

  availability:
    nodeSelector:
      doks.digitalocean.com/node-pool: openclaw
    tolerations:
      - key: workload
        operator: Equal
        value: openclaw
        effect: NoSchedule

  networking:
    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-secret: openclaw-basic-auth
        nginx.ingress.kubernetes.io/auth-realm: "OpenClaw"
      security:
        forceHTTPS: false
        enableHSTS: false
      hosts:
        - host: ai.0x69.xyz
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: openclaw-tls
          hosts:
            - ai.0x69.xyz
