apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: immich
spec:
  instances: 1

  # Use imageCatalogRef instead of imageName to bypass CNPG's tag validation.
  # The catalog declares the major version explicitly; the operator trusts it.
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ImageCatalog
    name: pgvecto-rs
    major: 16

  postgresql:
    shared_preload_libraries:
      - vectors.so

  bootstrap:
    initdb:
      database: immich
      owner: immich
      # CloudNativePG reads 'username' and 'password' keys from this secret.
      # Applied imperatively; see secret.yaml for the template.
      secret:
        name: immich-postgres

  storage:
    size: 8Gi
    storageClass: do-block-storage
