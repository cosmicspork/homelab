apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - containerPort: 18789
          env:
            # Point OpenClaw at our ConfigMap-backed config file so we can
            # set bind: custom / customBindHost: 0.0.0.0. The 'lan' mode
            # resolves to 127.0.0.1 inside containers, breaking liveness probes.
            - name: OPENCLAW_CONFIG_PATH
              value: /etc/openclaw/openclaw.json
            - name: OPENCLAW_GATEWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: gateway-password
          volumeMounts:
            - name: config-file
              mountPath: /etc/openclaw
              readOnly: true
            - name: state
              mountPath: /home/node/.openclaw
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 15
      volumes:
        - name: config-file
          configMap:
            name: openclaw-config
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-config
